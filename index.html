<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Felix | About Me</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px;
    }
    .top {
      display: flex;
      gap: 18px;
      align-items: center;
      margin-bottom: 18px;
    }
    .avatar {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--line);
    }
    h1 { margin: 0; font-size: 1.8rem; }
    p { margin: 10px 0 0; color: var(--muted); }
    h2 { margin: 20px 0 8px; font-size: 1.05rem; }
    ul { margin: 0; padding-left: 18px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <div class="top">
        <img class="avatar" src="avatar.png" alt="Felix avatar" />
        <div>
          <h1>Felix</h1>
          <p>HKU student focused on statistics, software, and simple useful tools.</p>
        </div>
      </div>

      <h2>About</h2>
      <p>I enjoy building clear, practical digital products with clean design and real-world usability.</p>

      <h2>Contact</h2>
      <ul>
        <li>GitHub: <a href="https://github.com/Felix-Li-0306" target="_blank" rel="noopener noreferrer">github.com/Felix-Li-0306</a></li>
        <li>Email: <a href="mailto:lizhuofei0306@gmail.com">lizhuofei0306@gmail.com</a></li>
      </ul>
    </section>

    <footer>© 2026 Felix</footer>
  </main>
</body>
</html>
