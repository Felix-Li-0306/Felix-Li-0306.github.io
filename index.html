<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Felix | Personal Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      max-width: 700px;
      width: 90%;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #cbd5e1;
    }

    .buttons {
      margin-top: 24px;
    }

    .buttons a {
      display: inline-block;
      margin: 8px;
      padding: 12px 20px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      background: #2563eb;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .buttons a:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Felix</h1>
    <p>
      Undergraduate student at HKU, learning statistics, building projects,
      and exploring technology.
    </p>
    <div class="buttons">
      <a href="https://github.com/your-github-username" target="_blank">GitHub</a>
      <a href="mailto:your-email@example.com">Contact</a>
    </div>
  </div>
</body>
</html>
